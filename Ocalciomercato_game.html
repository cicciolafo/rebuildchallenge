<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALCIOMERCATO — IL GIOCO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#080c08;--bg2:#0f140f;--bg3:#161e16;--card:#1c261c;--border:#263326;
  --green:#39d353;--green2:#1a7a2a;--gold:#f5c842;--red:#ff3a4a;
  --muted:#6b8c6b;--text:#d4e8d4;
  --t0:#38bdf8;--t1:#fb923c;--t2:#c084fc;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;min-height:48px}
.logo{font-family:'Bebas Neue';font-size:24px;letter-spacing:4px;background:linear-gradient(90deg,var(--green),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.phase-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-family:'Barlow Condensed';font-size:12px;letter-spacing:2px;color:var(--muted)}
.phase-pill.active{border-color:var(--green);color:var(--green)}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}

/* TOP TEAM CHIPS — hidden until revealed */
.top-team-slot{display:flex;align-items:center;gap:4px;cursor:pointer}
.top-team-hidden{background:var(--bg3);border:1px dashed var(--border);border-radius:8px;padding:3px 12px;font-size:11px;color:var(--muted);font-family:'Barlow Condensed';letter-spacing:1px;transition:all .2s}
.top-team-hidden:hover{border-color:var(--green);color:var(--green)}
.top-team-chip{border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;font-family:'Barlow Condensed';letter-spacing:1px}
.ttc0{background:rgba(56,189,248,.15);color:var(--t0);border:1px solid rgba(56,189,248,.4)}
.ttc1{background:rgba(251,146,60,.15);color:var(--t1);border:1px solid rgba(251,146,60,.4)}
.ttc2{background:rgba(192,132,252,.15);color:var(--t2);border:1px solid rgba(192,132,252,.4)}

/* NAV BTNS */
.nav-btns{display:flex;gap:6px;margin-left:8px}
.nav-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed';font-size:12px;letter-spacing:1px;padding:4px 10px;transition:all .15s}
.nav-btn:hover:not(:disabled){border-color:var(--text);color:var(--text)}
.nav-btn:disabled{opacity:.25;cursor:not-allowed}

.main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:260px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.stab{flex:1;padding:8px 4px;text-align:center;font-family:'Barlow Condensed';font-size:11px;letter-spacing:2px;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.stab.on{color:var(--text);border-bottom-color:var(--green)}
.sidebar-body{flex:1;overflow-y:auto;padding:10px}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}

/* TYPOGRAPHY */
.sec-label{font-family:'Barlow Condensed';font-size:11px;letter-spacing:3px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
h2{font-family:'Bebas Neue';font-size:32px;letter-spacing:3px;line-height:1}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.card.glow-green{box-shadow:0 0 20px rgba(57,211,83,.15);border-color:rgba(57,211,83,.4)}
.card.glow-gold{box-shadow:0 0 20px rgba(245,200,66,.15);border-color:rgba(245,200,66,.4)}

/* TEAM CHIPS */
.team-chip{display:inline-flex;align-items:center;gap:6px;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:600}
.tc0{background:rgba(56,189,248,.12);color:var(--t0);border:1px solid rgba(56,189,248,.3)}
.tc1{background:rgba(251,146,60,.12);color:var(--t1);border:1px solid rgba(251,146,60,.3)}
.tc2{background:rgba(192,132,252,.12);color:var(--t2);border:1px solid rgba(192,132,252,.3)}

/* FLIP CARD */
.flip-wrap{perspective:900px;width:150px;height:200px;cursor:pointer;flex-shrink:0}
.flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.flip-wrap.flipped .flip-inner{transform:rotateY(180deg)}
.flip-face,.flip-back{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px}
.flip-face{background:linear-gradient(145deg,#1c3a1c,#0f1e0f);border:1px solid var(--border)}
.flip-face-pattern{font-size:44px;opacity:.12;font-family:'Bebas Neue';color:var(--green);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;user-select:none}
.flip-face-label{font-family:'Bebas Neue';font-size:13px;letter-spacing:3px;color:var(--muted);position:relative;z-index:1;text-align:center}
.flip-back{background:var(--card);border:1px solid var(--green);transform:rotateY(180deg);gap:5px;text-align:center}
.flip-back .player-name{font-family:'Bebas Neue';font-size:17px;letter-spacing:2px;color:var(--green);line-height:1.1}
.flip-back .player-val{font-family:'Barlow Condensed';font-size:20px;font-weight:700;color:var(--gold)}
.flip-back .player-info{font-size:11px;color:var(--muted);line-height:1.5}
.flip-back .player-pos{background:var(--bg3);border-radius:4px;padding:2px 7px;font-family:'Barlow Condensed';font-size:10px;letter-spacing:2px;color:var(--text)}
.flip-back[data-stage="1"] .player-name,.flip-back[data-stage="1"] .player-info{display:none!important}
.flip-back[data-stage="2"] .player-name{display:none!important}

/* BENCH FLIP smaller */
.bench-flip-wrap{perspective:600px;width:120px;height:155px;cursor:pointer;flex-shrink:0}
.bench-flip-wrap .flip-inner{transition:transform .4s}
.bench-flip-wrap.flipped .flip-inner{transform:rotateY(180deg)}
.bench-flip-wrap .flip-face{background:linear-gradient(145deg,#1a1a2e,#0f0f1e);border:1px solid var(--border)}
.bench-flip-wrap .flip-back{background:var(--bg3);border:1px solid var(--muted)}
.bench-flip-wrap .flip-back .player-name{font-size:13px}
.bench-flip-wrap .flip-back .player-val{font-size:14px}

/* BUTTONS */
.btn{border:none;border-radius:8px;cursor:pointer;font-family:'Barlow Condensed';font-weight:600;letter-spacing:1px;padding:8px 16px;font-size:13px;transition:all .15s}
.btn-green{background:var(--green2);color:var(--green);border:1px solid var(--green)}
.btn-green:hover{background:var(--green);color:#000}
.btn-red{background:rgba(255,58,74,.15);color:var(--red);border:1px solid var(--red)}
.btn-red:hover{background:var(--red);color:#fff}
.btn-gold{background:rgba(245,200,66,.15);color:var(--gold);border:1px solid var(--gold)}
.btn-gold:hover{background:var(--gold);color:#000}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.btn-big{padding:12px 28px;font-size:17px;letter-spacing:2px;border-radius:10px}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

/* BID */
.bid-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:14px}
.bid-num{font-family:'Bebas Neue';font-size:48px;color:var(--gold);line-height:1;text-align:center}
.bid-leader{font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px}
.bid-leader span{font-weight:700;color:var(--text)}
.bid-team-row{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:8px;padding:7px 10px;margin-bottom:5px}
.bid-team-name{flex:1;font-family:'Barlow Condensed';font-size:13px;font-weight:600}
.bid-team-budget{font-size:11px;color:var(--muted)}
.bid-btns{display:flex;gap:3px}
.bid-btn{border:none;border-radius:5px;cursor:pointer;font-family:'Barlow Condensed';font-size:11px;font-weight:700;padding:4px 7px;transition:all .15s}
.bid-btn:disabled{opacity:.25;cursor:not-allowed}

/* FORMATION SIDEBAR */
.form-slot{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 6px;min-width:60px;text-align:center;cursor:pointer;transition:all .15s}
.form-slot:hover{border-color:var(--green)}
.form-slot.filled{border-color:rgba(57,211,83,.35)}
.form-slot.sold-out{border-color:var(--red);opacity:.5}
.form-slot-pos{font-family:'Barlow Condensed';font-size:9px;letter-spacing:2px;color:var(--muted)}
.form-slot-name{font-size:10px;font-weight:600;line-height:1.2;margin-top:1px}
.form-slot-val{font-size:9px;color:var(--gold)}

/* FIN */
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.fin-row:last-child{border:none}
.fin-plus{color:var(--green)}.fin-minus{color:var(--red)}
.fin-total{display:flex;justify-content:space-between;padding:6px 0 0;font-weight:700;font-size:13px;border-top:2px solid var(--border);margin-top:3px}

/* MK */
.mk-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 10px;margin-bottom:5px;font-size:12px;line-height:1.4;position:relative}
.mk-card.done{opacity:.5}
.mk-card.done::after{content:'✓';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--green);font-size:14px;font-weight:700}
.mk-cond{color:var(--muted);font-size:10px;margin-top:2px}

/* ROLE BADGES */
.role-badge{display:inline-block;font-family:'Barlow Condensed';font-size:11px;letter-spacing:2px;padding:2px 8px;border-radius:5px;font-weight:700}
.rb-POR{background:rgba(251,146,60,.15);color:#fb923c;border:1px solid rgba(251,146,60,.3)}
.rb-TS,.rb-TD{background:rgba(56,189,248,.15);color:#38bdf8;border:1px solid rgba(56,189,248,.3)}
.rb-DCS,.rb-DCD{background:rgba(139,92,246,.15);color:#8b5cf6;border:1px solid rgba(139,92,246,.3)}
.rb-CCS,.rb-CDC,.rb-CCD{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.rb-AS,.rb-AD,.rb-ATT{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.q-TOP{color:var(--gold)}.q-SEMITOP{color:var(--green)}.q-ENTRY{color:var(--muted)}

/* ROLE PILLS */
.role-pill{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-family:'Barlow Condensed';font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .15s;display:inline-block}
.role-pill:hover:not(.used){border-color:var(--green);color:var(--green)}
.role-pill.used{opacity:.3;text-decoration:line-through;cursor:default;pointer-events:none}
.role-pill.current{border-color:var(--gold);color:var(--gold)}

/* TAGS */
.tag{display:inline-block;border-radius:4px;padding:1px 6px;font-size:10px;font-family:'Barlow Condensed';letter-spacing:1px}
.tag-sold{background:rgba(255,58,74,.12);color:var(--red);border:1px solid rgba(255,58,74,.3)}
.tag-kept{background:rgba(57,211,83,.1);color:var(--green);border:1px solid rgba(57,211,83,.25)}
.tag-bought{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.3)}
.divider{height:1px;background:var(--border);margin:10px 0}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* MYSTERY BOX */
.mystery-box{background:var(--bg3);border:1px dashed var(--border);border-radius:10px;padding:16px;font-family:'Bebas Neue';font-size:36px;color:var(--border);cursor:pointer;transition:all .2s;text-align:center}
.mystery-box:hover{border-color:var(--green);color:var(--green)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--card);border:1px solid var(--green);border-radius:16px;padding:24px;max-width:420px;width:92%;text-align:center;animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.modal h2{margin-bottom:6px}
.modal p{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:18px}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

/* HOME SCREEN */
.home-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;z-index:300}
.home-screen.hidden{display:none}
.home-logo{font-family:'Bebas Neue';font-size:clamp(48px,8vw,88px);letter-spacing:8px;background:linear-gradient(135deg,var(--green),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.home-sub{font-family:'Barlow Condensed';letter-spacing:10px;font-size:13px;color:var(--muted);margin-top:-8px}
.home-btns{display:flex;flex-direction:column;gap:12px;width:280px}
.home-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);cursor:pointer;font-family:'Barlow Condensed';font-size:20px;letter-spacing:3px;padding:16px 24px;text-align:left;transition:all .2s;display:flex;align-items:center;gap:12px}
.home-btn:hover{border-color:var(--green);color:var(--green);background:rgba(57,211,83,.05)}
.home-btn .hb-icon{font-size:24px}
.home-btn.primary{border-color:var(--green2);background:rgba(57,211,83,.08)}
.home-save-list{width:280px;display:flex;flex-direction:column;gap:6px}
.save-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.save-item:hover{border-color:var(--gold)}
.save-item-title{font-family:'Barlow Condensed';font-size:14px;font-weight:600}
.save-item-meta{font-size:11px;color:var(--muted)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* FORMATION OVERLAY */
.fo-player{
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:7px 10px;display:flex;flex-direction:column;gap:2px;
  transition:border-color .15s;cursor:default;min-width:0;
}
.fo-player:hover{border-color:var(--green)}
.fo-player-pos{font-family:'Barlow Condensed';font-size:9px;letter-spacing:2px;color:var(--muted)}
.fo-player-name{font-size:12px;font-weight:700;line-height:1.2}
.fo-player-info{font-size:10px;color:var(--muted)}
.fo-player-tag{font-size:9px;font-family:'Barlow Condensed';letter-spacing:1px;margin-top:2px}
.fo-sold{border-color:rgba(255,58,74,.3)!important;opacity:.6}
.fo-promoted{border-color:rgba(245,200,66,.3)!important}
.fo-bought{border-color:rgba(57,211,83,.35)!important}

/* ═══════════════ MOBILE RESPONSIVE ═══════════════ */

/* Sidebar becomes a bottom drawer on mobile */
@media (max-width: 700px) {
  html,body{overflow:hidden;height:100%;height:100dvh}

  /* Topbar: compact, wrap to 2 rows */
  .topbar{padding:6px 10px;gap:6px;flex-wrap:wrap;min-height:auto}
  .logo{font-size:18px;letter-spacing:3px}
  .phase-pill{font-size:10px;padding:2px 8px;letter-spacing:1px}
  #phasePills{display:none} /* hide on mobile, shown in drawer */
  .nav-btns{gap:4px;margin-left:0}
  .nav-btn{font-size:10px;padding:4px 7px;letter-spacing:0}
  .topbar-right{margin-left:0;flex-wrap:wrap;gap:4px}

  /* Top team chips smaller */
  .top-team-hidden,.top-team-chip{font-size:10px;padding:2px 7px}

  /* Hide text labels on icon buttons */
  #btnBack{font-size:0;padding:6px 10px}
  #btnBack::after{content:'←';font-size:14px}
  #btnNext{font-size:0;padding:6px 10px}
  #btnNext::after{content:'→';font-size:14px}

  /* Main layout: stack vertically, no sidebar by default */
  .main{flex-direction:column-reverse;position:relative}

  /* Sidebar: hidden by default, slides up as bottom sheet */
  .sidebar{
    width:100%;height:0;
    border-right:none;border-top:1px solid var(--border);
    transition:height .3s cubic-bezier(.4,0,.2,1);
    overflow:hidden;flex-shrink:0;
  }
  .sidebar.open{height:42vh}
  .sidebar-body{padding:8px}

  /* Sidebar toggle button */
  #sidebarToggle{
    display:flex;align-items:center;gap:5px;
  }
  #sidebarToggle.open{color:var(--green);border-color:var(--green)}

  /* Content area: full width */
  .content{padding:12px;gap:12px}

  /* Flip cards: slightly smaller on mobile */
  .flip-wrap{width:110px;height:150px}
  .flip-face-label{font-size:11px;letter-spacing:2px}
  .flip-back .player-name{font-size:14px}
  .flip-back .player-val{font-size:16px}
  .flip-back .player-info{font-size:10px}
  .bench-flip-wrap{width:95px;height:125px}

  /* Cards row: wrap tighter */
  .player-cards-row{gap:10px}

  /* Bid box */
  .bid-num{font-size:38px}
  .bid-team-row{flex-wrap:wrap;gap:5px}
  .bid-team-budget{width:100%}
  .bid-btns{gap:5px}
  .bid-btn{padding:7px 10px;font-size:12px}

  /* Buttons */
  .btn-big{padding:10px 20px;font-size:15px}
  h2{font-size:24px}

  /* Formation overlay */
  #formationPanel{
    width:100% !important;max-width:100% !important;
    border-radius:16px 16px 0 0 !important;
    position:fixed;bottom:0;left:0;right:0;
    max-height:88vh;
    animation:slideUp .3s ease !important;
  }
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  #formationOverlay{align-items:flex-end}

  /* Team reveal cards */
  .team-reveal-card-mobile{min-width:85px !important;max-width:120px !important;padding:12px 8px !important}

  /* Role pills: wrap */
  .roles-remaining{gap:5px}
  .role-pill{font-size:11px;padding:3px 7px}

  /* Modal */
  .modal{padding:18px;border-radius:14px}
  .modal h2{font-size:20px}
}

@media (max-width: 380px) {
  .flip-wrap{width:90px;height:125px}
  .flip-face-label{font-size:10px}
  .flip-back .player-name{font-size:12px;letter-spacing:1px}
  .flip-back .player-val{font-size:14px}
  .bench-flip-wrap{width:80px;height:108px}
}

/* ═══════════════ API SETUP SCREEN ═══════════════ */
.setup-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px;overflow-y:auto;z-index:250}
.setup-screen.hidden{display:none}
.setup-step{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;width:100%;max-width:820px;margin-bottom:16px}
.setup-step-title{font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.setup-step-num{background:var(--green2);color:var(--green);border:1px solid var(--green);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.league-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.league-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed';font-size:12px;letter-spacing:1px;padding:6px 12px;transition:all .15s}
.league-btn:hover,.league-btn.selected{border-color:var(--green);color:var(--green);background:rgba(57,211,83,.08)}
.team-search-box{display:flex;gap:8px;margin-bottom:10px}
.team-search-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:8px 12px;flex:1;outline:none;transition:border-color .2s}
.team-search-input:focus{border-color:var(--green)}
.team-results{display:flex;flex-wrap:wrap;gap:6px;min-height:40px}
.team-result-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;padding:6px 12px;transition:all .15s;display:flex;align-items:center;gap:6px}
.team-result-btn:hover{border-color:var(--gold);color:var(--gold)}
.team-result-btn img{width:20px;height:20px;object-fit:contain}

/* ═══════════════════════════════ SAVE / LOAD (Firebase Realtime DB) ═══════════════════════════════ */

// Firebase ready flag
let _fbOk = false;

// Defined globally so Firebase init block can call it immediately
window._onFirebaseReady = function(){
  _fbOk = true;
  const dot = document.getElementById('fbDot');
  const lbl = document.getElementById('fbLabel');
  if(dot) dot.style.background = 'var(--green)';
  if(lbl) lbl.textContent = 'Firebase connesso ✓';
};

function _genKey(){
  // unique key: timestamp + random suffix
  return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
}

async function saveGame(){
  if(!_fbOk){ showModal('⚠️ Firebase non pronto','Attendi la connessione e riprova.'); return; }
  const now = new Date();
  const label = G.teams.length ? G.teams.map(t=>t.name).join(' · ') : 'Partita';
  const date = `${now.getDate()}/${now.getMonth()+1} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  // reuse existing key if already saved, otherwise generate new
  if(!G._saveKey) G._saveKey = _genKey();
  const payload = {
    label, date,
    phase: G.phase,
    savedAt: Date.now(),
    state: JSON.parse(JSON.stringify(G))
  };
  try {
    await window._fb.saveGame(G._saveKey, payload);
    showModal('☁️ Partita salvata!', `<strong>${label}</strong> salvata su Firebase.<br><small style="color:var(--muted)">ID: ${G._saveKey}</small>`);
  } catch(e) {
    showModal('❌ Errore salvataggio', e.message || 'Controlla la connessione.');
  }
}

  el.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px">Caricamento...</div>';
  el.classList.remove('hidden');
  if(!_fbOk){ el.innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center">Firebase non connesso</div>'; return; }
  try {
    const all = await window._fb.loadAll();
    const keys = Object.keys(all).sort((a,b) => (all[b].savedAt||0) - (all[a].savedAt||0));
    if(!keys.length){
      el.innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center">Nessuna partita salvata</div>';
      return;
    }
    el.innerHTML = keys.map(k => {
      const s = all[k];
      return `<div class="save-item" onclick="loadSave('${k}')">
        <div>
          <div class="save-item-title">${s.label||'Partita'}</div>
          <div class="save-item-meta">${s.date||''} · Fase ${s.phase||'?'}</div>
        </div>
        <button class="btn btn-ghost" style="font-size:11px;padding:3px 8px;flex-shrink:0"
          onclick="deleteSave(event,'${k}')">✕</button>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML=`<div style="color:var(--red);font-size:12px">Errore: ${e.message}</div>`;
  }
}

async function loadSave(key){
  if(!_fbOk){ showModal('⚠️ Firebase non pronto','Attendi la connessione.'); return; }
  try {
    const all = await window._fb.loadAll();
    const save = all[key];
    if(!save) return;
    G = save.state;
    G._saveKey = key; // keep the same key for future saves
    document.getElementById('homeScreen').classList.add('hidden');
    renderAll();
  } catch(e) {
    showModal('❌ Errore caricamento', e.message);
  }
}

async function deleteSave(e, key){
  e.stopPropagation();
  if(!_fbOk) return;
  try {
    await window._fb.deleteGame(key);
    showLoadScreen();
  } catch(e) {
    showModal('❌ Errore', e.message);
  }
}

/* ═══════════════════════════════ NAVIGATION ═══════════════════════════════ */
// Phase order for back/next
const PHASE_STEPS=[
  {phase:1,step:null},    // team reveal
  {phase:2,step:null},    // marketing
  {phase:3,step:'pick'},  // role pick
  // role loop steps are handled internally
];

function pushHistory(){
  const snap={phase:G.phase,step:G.currentRoleStep,role:G.currentRole};
  if(HISTORY_POS<HISTORY.length-1)HISTORY=HISTORY.slice(0,HISTORY_POS+1);
  HISTORY.push(snap);
  HISTORY_POS=HISTORY.length-1;
  updateNavBtns();
}

function navBack(){
  // Simple: go back to previous role step or phase
  if(G.currentRoleStep==='starter_reveal'&&G.currentRole){
    // back to pick
    G.currentRole=null;G.currentRoleStep='pick';
    G.rolesRemaining=[...ROLES_ORDER].filter(r=>!G.rolesDone.includes(r));
    // remove last extracted if no action taken
    if(G.rolesExtracted.length&&!G.rolesDone.includes(G.rolesExtracted[G.rolesExtracted.length-1])){
      const r=G.rolesExtracted.pop();
      G.rolesRemaining.push(r);
    }
    renderAll();return;
  }
  if(G.currentRoleStep==='bench_reveal'){G.currentRoleStep='starter_reveal';renderAll();return;}
  if(G.currentRoleStep==='market'){G.currentRoleStep='bench_reveal';renderAll();return;}
  if(G.phase===3&&G.currentRoleStep==='pick'){G.phase=2;renderAll();return;}
  if(G.phase===2){G.phase=1;renderAll();return;}
}

function navNext(){
  if(G.phase===1&&G.teamRevealed.every(v=>v)){goPhase2();return;}
  if(G.phase===2&&G.mkRevealed.every(v=>v)){startRoleLoop();return;}
}

function updateNavBtns(){
  const b=document.getElementById('btnBack');
  const n=document.getElementById('btnNext');
  // back available if not on home/first screen
  b.disabled=(G.phase<=1&&G.teamRevealed.every(v=>!v));
  // next available on phase 1 when all revealed, phase 2 when all revealed
  n.disabled=!(
    (G.phase===1&&G.teamRevealed.every(v=>v))||
    (G.phase===2&&G.mkRevealed.every(v=>v))
  );
}

/* ═══════════════════════════════ INIT ═══════════════════════════════ */
function initGame(){
  const order=shuffle([0,1,2]);
  G.teams=order.map(rawIdx=>{
    const r=TEAMS_RAW[rawIdx];
    return{
      rawIdx,name:r.name,budget:r.budget,marketVal:r.marketVal,
      starters:r.starters.map(p=>({...p,status:'starter'})),
      bench:r.bench.map(p=>({...p,status:'bench'})),
      acquired:[],
      financeLog:[{label:'Budget iniziale',amount:r.budget,pos:true}],
    };
  });
  G.phase=1;
  renderAll();
}

function renderAll(){

function sSwitchTab(tab){
  ['formation','finance','marketing'].forEach(t=>{
    document.getElementById(`sidebar-${t}`).style.display=t===tab?'block':'none';
  });
  document.querySelectorAll('.stab').forEach((b,idx)=>{
    b.classList.toggle('on',['formation','finance','marketing'][idx]===tab);
  });
}

/* ═══════════════════════════════ MAIN CONTENT ═══════════════════════════════ */
function renderMain(){
  const el=document.getElementById('mainContent');
  if(G.phase===0){el.innerHTML='';return;}
  if(G.phase===1){el.innerHTML=renderPhase1();return;}
  if(G.phase===2){el.innerHTML=renderPhase2();return;}
  if(G.phase===3){
    if(G.currentRoleStep==='pick')el.innerHTML=renderRolePick();
    else if(G.currentRoleStep==='starter_reveal')el.innerHTML=renderStarterReveal();
    else if(G.currentRoleStep==='bench_reveal')el.innerHTML=renderStarterReveal(); // bench merged below
    else if(G.currentRoleStep==='market')el.innerHTML=renderMarketPhase();
    else if(G.currentRoleStep==='finance')el.innerHTML=renderFinancePhase();
    else if(G.currentRoleStep==='marketing_extra')el.innerHTML=renderMarketingExtra();
    return;
  }
  if(G.phase===4){el.innerHTML=renderEnd();return;}
}

/* ─── PHASE 2: MARKETING ─── */

  for(let i=0;i<3;i++)if(pool.length)G.teamMarketing[i].push(pool.splice(0,1)[0]);

  G.mkRevealed=[false,false,false];
}

function startRoleLoop(){

}

/* ─── ROLE PICK ─── */
function renderRolePick(){
  if(G.rolesDone.length===11){G.phase=4;renderAll();return'';}
  return`<div style="max-width:800px;margin:auto">
    <div class="sec-label">FASE 3 — ESTRAZIONE RUOLI</div>
    <h2 style="margin-bottom:4px">ESTRAI UN RUOLO</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:8px">
      Ruoli estratti: <strong>${G.rolesDone.length}</strong>/11 — Ciclo: <strong>${G.rolesThisCycle}/3</strong>
    </p>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px">
      ${ROLES_ORDER.map(r=>`<div class="role-pill${G.rolesDone.includes(r)?' used':''}">${r}</div>`).join('')}
    </div>
    <div style="text-align:center;margin-bottom:16px">
      <button class="btn btn-gold btn-big pulse" onclick="extractRole()">🎲 ESTRAI RUOLO</button>
    </div>
    ${G.rolesExtracted.length?`
    <div class="card">
      <div class="sec-label">STORICO</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${G.rolesExtracted.map(r=>`<span class="role-badge rb-${r}">${r}</span>`).join('')}
      </div>
    </div>`:''}
  </div>`;
}

function extractRole(){
  if(!G.rolesRemaining.length)return;
  const role=rand(G.rolesRemaining);
  G.rolesRemaining=G.rolesRemaining.filter(r=>r!==role);
  G.rolesExtracted.push(role);
  G.currentRole=role;
  G.currentRoleStep='starter_reveal';
  G.currentStarterFlips=[0,0,0];
  G.currentBenchFlips=[false,false,false];
  G.starterActed=[false,false,false];
  G.benchActed=[false,false,false];
  G.starterDecisions[role]=[];
  G.benchDecisions[role]=[];
  renderAll();
}

/* ─── STARTER + BENCH REVEAL (merged) ─── */
function renderStarterReveal(){
  const role=G.currentRole;
  const allStarterActed=G.starterActed.every(v=>v);

  // Build starter cards + bench cards below each
  const cols=G.teams.map((t,ti)=>{
    const p=t.starters.find(s=>s.pos===role);
    const b=t.bench.find(s=>s.pos===role);
    const stage=G.currentStarterFlips[ti];
    const acted=G.starterActed[ti];
    const soldStarter=acted&&G.starterDecisions[role]?.find(d=>d.teamIdx===ti)?.sold;

    // bench
    const benchFlipped=G.currentBenchFlips[ti];
    const benchActed=G.benchActed[ti];
    const benchDec=benchActed?G.benchDecisions[role]?.find(d=>d.teamIdx===ti):null;
    // bench actions only if starter was sold
    const canActBench=soldStarter;

    return`<div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div class="team-chip tc${ti}">${t.name}</div>

      <!-- STARTER CARD -->
      <div class="flip-wrap${stage>0?' flipped':''}" onclick="flipStarter(${ti})">
        <div class="flip-inner">
          <div class="flip-face"><div class="flip-face-pattern">⚽</div><div class="flip-face-label">TITOLARE<br>${role}</div></div>
          <div class="flip-back" data-stage="${stage}">
            <div class="player-pos">${role}</div>
            <div class="player-val">${fm(p.val)}</div>
            <div class="player-info">${p.nat} · ${p.age} anni</div>
            <div class="player-name">${p.name}</div>
          </div>
        </div>
      </div>
      ${stage===3&&!acted?`
        <div style="display:flex;flex-direction:column;gap:5px;align-items:center">
          <button class="btn btn-red" style="font-size:12px;padding:6px 14px" onclick="starterDecision(${ti},'sell')">💸 VENDI ${fm(p.val)}</button>
          <button class="btn btn-ghost" style="font-size:12px;padding:6px 14px" onclick="starterDecision(${ti},'keep')">🔒 TIENI</button>
        </div>`:''}
      ${acted?`<div class="tag ${soldStarter?'tag-sold':'tag-kept'}">${soldStarter?'VENDUTO':'TENUTO'}</div>`:''}

      <!-- BENCH CARD (below, smaller) -->
      ${allStarterActed?`
      <div style="margin-top:6px;padding-top:8px;border-top:1px dashed var(--border);width:100%;text-align:center">
        <div style="font-family:'Barlow Condensed';font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:4px">RISERVA</div>
        <div style="display:flex;justify-content:center">
          <div class="bench-flip-wrap${benchFlipped?' flipped':''}"
            onclick="${canActBench&&!benchActed?`flipBench(${ti})`:''}">
            <div class="flip-inner">
              <div class="flip-face" style="${!canActBench?'opacity:.35':''}">
                <div class="flip-face-pattern" style="font-size:28px">🪑</div>
                <div class="flip-face-label" style="font-size:11px">RISERVA<br>${role}</div>
              </div>
              <div class="flip-back">
                <div class="player-pos">${role}</div>
                <div class="player-info">${b.nat} · ${b.age} anni</div>
                <div class="player-name">${b.name}</div>
              </div>
            </div>
          </div>
        </div>
        ${!canActBench?`<div style="font-size:10px;color:var(--muted);margin-top:4px">Solo se vendi il titolare</div>`:''}
        ${canActBench&&benchFlipped&&!benchActed?`
          <div style="display:flex;flex-direction:column;gap:4px;margin-top:6px;align-items:center">
            <button class="btn btn-gold" style="font-size:11px;padding:4px 10px" onclick="benchDecision(${ti},'promote')">⬆ PROMUOVI</button>
            <button class="btn btn-red" style="font-size:11px;padding:4px 10px" onclick="benchDecision(${ti},'sell')">CEDI</button>
          </div>`:''}
        ${benchActed?`
          <div class="tag ${benchDec?.action==='sell'?'tag-sold':'tag-bought'}" style="margin-top:5px">
            ${benchDec?.action==='sell'?'CEDUTO':'PROMOSSO'}
          </div>`:''}
      </div>`:''}
    </div>`;
  }).join('');

  const allBenchActed=G.starterActed.every(v=>v)&&
    G.teams.every((_,ti)=>{
      const soldSt=G.starterDecisions[role]?.find(d=>d.teamIdx===ti)?.sold;
      return !soldSt||G.benchActed[ti]; // if didn't sell, bench is not required
    });

  return`<div style="max-width:920px;margin:auto">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div class="sec-label" style="margin-bottom:0">RUOLO ESTRATTO</div>
      <span class="role-badge rb-${role}" style="font-size:16px;padding:4px 14px">${role}</span>
    </div>
    <p style="color:var(--muted);font-size:12px;margin-bottom:18px">Clicca per rivelare: valore → nazionalità + età → nome</p>
    <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">
      ${cols}
    </div>
    ${allBenchActed?`
    <div style="text-align:center;margin-top:20px">
      <button class="btn btn-green btn-big" onclick="goToMarket()">AVANTI: MERCATO →</button>
    </div>`:''}
  </div>`;
}

function flipStarter(ti){
  if(G.starterActed[ti])return;
  const s=G.currentStarterFlips[ti];
  if(s<3){
    G.currentStarterFlips[ti]=s+1;
    // When fully revealed, auto-reveal in sidebar
    if(s+1===3){
      const role=G.currentRole;
      G.sidebarRevealed[`${ti}_${role}`]=true;
      renderSidebarFormation();
    }
    renderMain();
  }
}

function starterDecision(ti,action){
  const role=G.currentRole;
  const p=G.teams[ti].starters.find(s=>s.pos===role);
  const sold=action==='sell';
  G.starterActed[ti]=true;
  G.starterDecisions[role].push({teamIdx:ti,sold,price:p.val});
  if(sold){
    p.status='sold';
    G.teams[ti].budget+=p.val;
    G.teams[ti].financeLog.push({label:`Vendita ${p.name}`,amount:p.val,pos:true});
    G.soldToMarket.push({pos:p.pos,name:p.name,nat:p.nat,age:p.age,val:p.val,quality:'USATO',fromTeam:ti,auctioned:false});
  }
  renderAll();
}

function flipBench(ti){
  G.currentBenchFlips[ti]=true;
  renderMain();
}

function benchDecision(ti,action){
  const role=G.currentRole;
  const p=G.teams[ti].bench.find(b=>b.pos===role);
  G.benchActed[ti]=true;
  G.benchDecisions[role].push({teamIdx:ti,action});
  if(action==='promote'){
    const sIdx=G.teams[ti].starters.findIndex(s=>s.pos===role&&s.status==='sold');
    if(sIdx>=0)G.teams[ti].starters[sIdx]={...p,status:'starter',promoted:true};
  }
  // auto-advance if all bench decisions are done
  const allDone=G.starterActed.every(v=>v)&&
    G.teams.every((_,i)=>{
      const soldSt=G.starterDecisions[role]?.find(d=>d.teamIdx===i)?.sold;
      return !soldSt||G.benchActed[i];
    });
  if(allDone){
    goToMarket();
  } else {
    renderAll();
  }
}

/* ─── MARKET PHASE ─── */
function goToMarket(){
  G.currentRoleStep='market';
  const role=G.currentRole;
  const freeItems=FREE_MARKET.filter(p=>p.pos===role);
  const soldItems=G.soldToMarket.filter(p=>p.pos===role&&!p.auctioned);
  const pool=[...freeItems,...soldItems];
  G.marketReveal={
    pool,
    flipStage:new Array(pool.length).fill(0),
    chosen:-1,
    qualified:G.teams.map((_,i)=>i).filter(i=>G.starterDecisions[role]?.find(d=>d.teamIdx===i&&d.sold)),
  };
  G.auctionActive=false;G.auctionPlayer=null;
  renderAll();
}

function renderMarketPhase(){
  const role=G.currentRole;
  if(G.auctionActive&&G.auctionPlayer)return renderAuction();
  const{pool,flipStage,qualified}=G.marketReveal;
  const freeItems=FREE_MARKET.filter(p=>p.pos===role);
  const soldItems=G.soldToMarket.filter(p=>p.pos===role&&!p.auctioned);
  const canBuy=qualified.length>0;

  const mkCard=(p,globalIdx)=>{
    const flp=flipStage[globalIdx]||0;
    const auctioned=pool[globalIdx]?.auctioned;
    const isSold=p.fromTeam!==undefined;
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      ${isSold
        ?`<div class="team-chip tc${p.fromTeam}" style="font-size:10px">da ${G.teams[p.fromTeam].name}</div>`
        :`<span style="font-family:'Barlow Condensed';font-size:11px;letter-spacing:2px;padding:2px 8px;border-radius:4px;
            ${p.quality==='TOP'?'color:var(--gold);border:1px solid rgba(245,200,66,.3);background:rgba(245,200,66,.08)'
            :p.quality==='SEMITOP'?'color:var(--green);border:1px solid rgba(57,211,83,.3);background:rgba(57,211,83,.08)'
            :'color:var(--muted);border:1px solid var(--border);background:var(--bg3)'}">${p.quality}</span>`}
      <div class="flip-wrap${flp>0?' flipped':''}"
        onclick="${auctioned?'':'flipMarketCard('+globalIdx+')'}"
        style="${auctioned?'opacity:.35;cursor:default':''}">
        <div class="flip-inner">
          <div class="flip-face">
            <div class="flip-face-pattern">${isSold?'🔄':'💎'}</div>
            <div class="flip-face-label">${isSold?'USATO':p.quality}<br>${role}</div>
          </div>
          <div class="flip-back" data-stage="${flp}">
            <div class="player-pos">${role}</div>
            <div class="player-val">${fm(p.val)}</div>
            <div class="player-info">${p.nat} · ${p.age} anni</div>
            <div class="player-name">${p.name}</div>
          </div>
        </div>
      </div>
      ${auctioned?`<div class="tag tag-sold">VENDUTO</div>`:''}
      ${flp===3&&!auctioned&&canBuy
        ?`<button class="btn btn-gold" style="font-size:11px;padding:5px 10px" onclick="startAuction(${globalIdx})">🔨 ASTA</button>`:''}
    </div>`;
  };

  return`<div style="max-width:900px;margin:auto">
    <div class="sec-label">FASE 4 — MERCATO: ${role}</div>
    <h2 style="margin-bottom:6px">GIOCATORI DISPONIBILI</h2>
    ${canBuy
      ?`<p style="font-size:12px;color:var(--muted);margin-bottom:16px">Possono acquistare: ${qualified.map(i=>`<span class="team-chip tc${i}" style="font-size:11px">${G.teams[i].name}</span>`).join(' ')}</p>`
      :`<p style="font-size:12px;color:var(--red);margin-bottom:16px">Nessuna squadra ha venduto il titolare — nessun acquisto disponibile</p>`}

    <div>
      <div class="sec-label">MERCATO LIBERO</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:20px">
        ${freeItems.map((p,pi)=>mkCard(p,pi)).join('')}
      </div>
    </div>

    ${soldItems.length?`
    <div>
      <div class="sec-label">CEDUTI DALLE SQUADRE</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:20px">
        ${soldItems.map((p,si)=>mkCard(p,freeItems.length+si)).join('')}
      </div>
    </div>`:''}

    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-green btn-big" onclick="finalizeRole()">✅ RUOLO ${role} COMPLETATO</button>
    </div>
  </div>`;
}

function flipMarketCard(idx){
  const s=G.marketReveal.flipStage[idx]||0;
  if(s<3){G.marketReveal.flipStage[idx]=s+1;renderMain();}
}

function startAuction(poolIdx){
  const p=G.marketReveal.pool[poolIdx];
  G.auctionActive=true;
  G.auctionPlayer={poolIdx,...p};
  G.auctionBid=p.val;
  G.auctionLeader=-1;
  renderMain();
}

/* ─── AUCTION ─── */
function renderAuction(){
  const p=G.auctionPlayer;
  const q=G.marketReveal.qualified;
  return`<div style="max-width:680px;margin:auto">
    <div class="sec-label">🔨 ASTA IN CORSO</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <h2>${p.name}</h2>
      <span class="role-badge rb-${p.pos}">${p.pos}</span>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      ${[['NAZIONALITÀ',p.nat],['ETÀ',p.age+' anni'],['QUALITÀ',p.quality||'USATO']].map(([l,v])=>
        `<div class="card" style="flex:1;min-width:100px;text-align:center;padding:10px">
          <div class="sec-label" style="justify-content:center;margin-bottom:4px">${l}</div>
          <div style="font-size:15px;font-weight:700">${v}</div>
        </div>`).join('')}
    </div>
    <div class="bid-box">
      <div class="bid-num">${fm(G.auctionBid)}</div>
      <div class="bid-leader">${G.auctionLeader>=0?`Leader: <span>${tname(G.auctionLeader)}</span>`:`Base d'asta: ${fm(p.val)}`}</div>
      <div>
        ${q.map(ti=>{
          const t=G.teams[ti];
          const can1=t.budget>=G.auctionBid+1e6;
          const can5=t.budget>=G.auctionBid+5e6;
          const can10=t.budget>=G.auctionBid+10e6;
          return`<div class="bid-team-row" style="border:1px solid ${tcVar(ti)}33">
            <div class="bid-team-name" style="color:${tcVar(ti)}">${t.name}</div>
            <div class="bid-team-budget">${fm(t.budget)}</div>
            <div class="bid-btns">
              <button class="bid-btn" style="background:${tcVar(ti)}22;color:${tcVar(ti)};border:1px solid ${tcVar(ti)}55" onclick="placeBid(${ti},1e6)" ${can1?'':'disabled'}>+1M</button>
              <button class="bid-btn" style="background:${tcVar(ti)}22;color:${tcVar(ti)};border:1px solid ${tcVar(ti)}55" onclick="placeBid(${ti},5e6)" ${can5?'':'disabled'}>+5M</button>
              <button class="bid-btn" style="background:${tcVar(ti)}22;color:${tcVar(ti)};border:1px solid ${tcVar(ti)}55" onclick="placeBid(${ti},10e6)" ${can10?'':'disabled'}>+10M</button>
            </div>
          </div>`;}).join('')}
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-green" style="flex:1;font-size:15px;padding:11px" onclick="showAssignPicker()">🔨 AGGIUDICA</button>
        <button class="btn btn-ghost" onclick="cancelAuction()">✕</button>
      </div>
    </div>
  </div>`;
}

function placeBid(ti,step){G.auctionBid+=step;G.auctionLeader=ti;renderMain();}

function showAssignPicker(){
  // Show modal to pick which team wins
  const q=G.marketReveal.qualified;
  const btns=[
    ...q.map(ti=>({
      label:G.teams[ti].name,
      cls:`btn-ghost`,
      fn:`assignToTeam(${ti})`
    })),
    {label:'✕ Chiudi', cls:'btn-red', fn:'closeModal()'}
  ];
  showModal('🔨 AGGIUDICA A CHI?',
    `Offerta corrente: <strong>${fm(G.auctionBid)}</strong> — scegli a chi aggiudicare il giocatore`,
    btns
  );
}

function assignToTeam(ti){
  closeModal();
  const p=G.auctionPlayer;
  const t=G.teams[ti];
  t.budget-=G.auctionBid;
  t.financeLog.push({label:`Acquisto ${p.name}`,amount:G.auctionBid,pos:false});
  const sIdx=t.starters.findIndex(s=>s.pos===p.pos&&s.status==='sold');
  const np={...p,status:'starter',boughtFor:G.auctionBid};
  if(sIdx>=0)t.starters[sIdx]=np;else t.acquired.push(np);
  // mark auctioned
  const pi=G.marketReveal.pool.findIndex(mp=>mp.name===p.name&&mp.pos===p.pos);
  if(pi>=0)G.marketReveal.pool[pi].auctioned=true;
  const si=G.soldToMarket.findIndex(sp=>sp.name===p.name&&sp.pos===p.pos&&!sp.auctioned);
  if(si>=0)G.soldToMarket[si].auctioned=true;
  G.auctionActive=false;G.auctionPlayer=null;
  G.sidebarRevealed[`${ti}_${p.pos}`]=true;
  showModal('🔨 AGGIUDICATO!',`<strong>${p.name}</strong> → <strong>${t.name}</strong><br>Pagato: <strong>${fm(G.auctionBid)}</strong>`);
}

function cancelAuction(){G.auctionActive=false;G.auctionPlayer=null;renderMain();}

/* ─── FINALIZE ROLE ─── */
function finalizeRole(){
  const role=G.currentRole;
  G.rolesDone.push(role);
  G.rolesThisCycle++;
  G.currentRole=null;
  if(G.rolesThisCycle===3){
    G.rolesThisCycle=0;
    const tot=G.rolesDone.length;
    if(tot===3||tot===9)G.currentRoleStep='finance';
    else if(tot===6)G.currentRoleStep='marketing_extra';
    else G.currentRoleStep='pick';
  } else G.currentRoleStep='pick';
  if(G.rolesDone.length===11)G.phase=4;
  renderAll();
}

/* ─── FINANCE PHASE ─── */
function renderFinancePhase(){
  if(!G.currentFinanceAssignment){
    const avail=FINANCE_CARDS.filter((_,i)=>!G.usedFinanceCards.includes(i));
    const picks=shuffle([...avail]);
    G.currentFinanceAssignment=G.teams.map((_,i)=>picks[i]||null);
    G.currentFinanceRevealed=[false,false,false];
    G.currentFinanceApplied=[false,false,false];
  }
  const allApplied=G.currentFinanceApplied.every(v=>v);
  return`<div style="max-width:750px;margin:auto">
    <div class="sec-label">💰 CARTE FINANZA</div>
    <h2 style="margin-bottom:16px">ESTRAZIONE CARTE FINANZA</h2>
    <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center">
      ${G.teams.map((t,i)=>{
        const card=G.currentFinanceAssignment[i];
        const rev=G.currentFinanceRevealed[i];
        const app=G.currentFinanceApplied[i];
        return`<div class="card" style="flex:1;min-width:180px;max-width:240px;text-align:center;border-color:${tcVar(i)}44">
          <div style="font-family:'Barlow Condensed';font-size:10px;letter-spacing:3px;color:${tcVar(i)};margin-bottom:8px">${t.name}</div>
          ${!rev
            ?`<div class="mystery-box" onclick="revealFinanceCard(${i})" style="margin:6px 0">🃏</div>
               <div style="font-size:11px;color:var(--muted)">Clicca per rivelare</div>`
            :`<div style="font-size:13px;font-weight:600;line-height:1.4;margin-bottom:8px">${card?.text||'—'}</div>
               <div style="font-family:'Bebas Neue';font-size:36px;${card?.pos?'color:var(--green)':'color:var(--red)'}">${card?.pos?'+':''}${card?fm(card.bonus):''}</div>
               ${!app?`<button class="btn ${card?.pos?'btn-green':'btn-red'}" style="margin-top:8px;width:100%" onclick="applyFinanceCard(${i})">APPLICA</button>`
                 :`<div class="tag tag-kept" style="margin-top:6px">APPLICATA ✓</div>`}`}
        </div>`;}).join('')}
    </div>
    ${allApplied?`<div style="text-align:center;margin-top:24px"><button class="btn btn-green btn-big" onclick="endFinancePhase()">CONTINUA →</button></div>`:''}
  </div>`;
}
function revealFinanceCard(i){G.currentFinanceRevealed[i]=true;renderMain();}
function applyFinanceCard(i){
  const card=G.currentFinanceAssignment[i];
  G.teams[i].budget+=card.bonus;
  G.teams[i].financeLog.push({label:card.text,amount:Math.abs(card.bonus),pos:card.pos});
  G.currentFinanceApplied[i]=true;
  const ci=FINANCE_CARDS.indexOf(card);
  if(ci>=0)G.usedFinanceCards.push(ci);
  renderAll();
}
function endFinancePhase(){G.currentFinanceAssignment=null;G.currentRoleStep='pick';renderAll();}

/* ─── MARKETING EXTRA ─── */
function renderMarketingExtra(){
  if(!G.extraMktAssigned){
    const used=G.teamMarketing.flat().map(c=>c.idx);
    const avail=G.marketingPool.filter(c=>!used.includes(c.idx));
    const picks=shuffle([...avail]);
    G.extraMktPicks=G.teams.map((_,i)=>picks[i]||null);
    G.extraMktAssigned=true;
    G.extraMktRevealed=[false,false,false];
    G.extraMktAdded=[false,false,false];
  }
  const allAdded=G.extraMktAdded.every(v=>v);
  return`<div style="max-width:750px;margin:auto">
    <div class="sec-label">📋 NUOVI OBIETTIVI MARKETING</div>
    <h2 style="margin-bottom:16px">SECONDA DISTRIBUZIONE MARKETING</h2>
    <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center">
      ${G.teams.map((t,i)=>{
        const c=G.extraMktPicks[i];const rev=G.extraMktRevealed[i];const added=G.extraMktAdded[i];
        return`<div class="card" style="flex:1;min-width:180px;max-width:240px;text-align:center;border-color:${tcVar(i)}44">
          <div style="font-family:'Barlow Condensed';font-size:10px;letter-spacing:3px;color:${tcVar(i)};margin-bottom:8px">${t.name}</div>
          ${!rev
            ?`<div class="mystery-box" onclick="revealExtraMkt(${i})" style="margin:6px 0">📋</div>
               <div style="font-size:11px;color:var(--muted)">Clicca per rivelare</div>`
            :`${c?`<div class="mk-card" style="text-align:left"><strong>${c.text}</strong><div class="mk-cond">${c.cond}</div></div>`:'<div style="color:var(--muted);font-size:12px">Nessuna carta disponibile</div>'}
               ${c&&!added?`<button class="btn btn-green" style="margin-top:8px;width:100%" onclick="addExtraMkt(${i})">AGGIUNGI</button>`:''}
               ${added?`<div class="tag tag-kept" style="margin-top:5px">AGGIUNTA ✓</div>`:''}`}
        </div>`;}).join('')}
    </div>
    ${allAdded?`<div style="text-align:center;margin-top:24px"><button class="btn btn-green btn-big" onclick="endMktExtra()">CONTINUA →</button></div>`:''}
  </div>`;
}
function revealExtraMkt(i){G.extraMktRevealed[i]=true;renderMain();renderSidebarMarketing();}
function addExtraMkt(i){const c=G.extraMktPicks[i];if(c)G.teamMarketing[i].push(c);G.extraMktAdded[i]=true;renderAll();}
function endMktExtra(){G.extraMktAssigned=false;G.currentRoleStep='pick';renderAll();}

/* ─── END ─── */
function renderEnd(){
  return`<div style="max-width:900px;margin:auto;text-align:center;padding:16px 0">
    <div class="sec-label">MERCATO CONCLUSO</div>
    <h2 style="font-size:48px;margin-bottom:20px">RISULTATI FINALI</h2>

/* ═══════════════════════════════ MODAL ═══════════════════════════════ */
function showModal(title,body,btns=[]){
  document.getElementById('mTitle').innerHTML=title;
  document.getElementById('mBody').innerHTML=body;
  document.getElementById('mBtns').innerHTML=btns.map(b=>
    `<button class="btn ${b.cls}" onclick="${b.fn}">${b.label}</button>`
  ).join('')||`<button class="btn btn-green" onclick="closeModal()">OK</button>`;
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.add('hidden');
  renderAll();
}

/* ═══════════════════════════════ MISSIONS ═══════════════════════════════ */
function completeMission(ti,ci){if(!G.mkDone[ti].includes(ci))G.mkDone[ti].push(ci);renderAll();}


/* ─── FORMATION OVERLAY ─── */
function showFormationView(){
  if(!G.teams.length) return;
  const panel = document.getElementById('formationPanelContent');
  const FORMATION_ROWS = [
    ['POR'],
    ['TS','DCS','DCD','TD'],
    ['CCS','CDC','CCD'],
    ['AS','ATT','AD']
  ];

  // Only roles that have been fully processed (in rolesDone) are visible
  const doneRoles = new Set(G.rolesDone);

  const playerCard = (p) => {
    const sold = p.status==='sold';
    const bought = !!p.boughtFor;
    const promoted = !!p.promoted;
    const extraClass = sold?'fo-sold':bought?'fo-bought':promoted?'fo-promoted':'';
    return `<div class="fo-player ${extraClass}">
      <div class="fo-player-pos">${p.pos}</div>
      <div class="fo-player-name">${p.name}</div>
      <div class="fo-player-info">${p.nat} · ${p.age} anni${p.val?` · ${fm(p.val)}`:''}${p.boughtFor?` · <span style="color:var(--gold)">${fm(p.boughtFor)}</span>`:''}</div>
      ${sold?`<div class="fo-player-tag" style="color:var(--red)">VENDUTO</div>`:''}
      ${promoted?`<div class="fo-player-tag" style="color:var(--gold)">PROMOSSO</div>`:''}
      ${bought?`<div class="fo-player-tag" style="color:var(--green)">ACQUISTATO</div>`:''}
    </div>`;
  };

  const emptySlot = (pos) =>
    `<div class="fo-player" style="opacity:.15">
      <div class="fo-player-pos">${pos}</div>
      <div class="fo-player-name" style="color:var(--border)">—</div>
    </div>`;

  panel.innerHTML = G.teams.map((t,ti) => {
    // Build position map: only show player if their role has been extracted & processed
    const posMap = {};
    t.starters.forEach(p => { if(doneRoles.has(p.pos)) posMap[p.pos] = p; });
    t.acquired.forEach(p => { if(doneRoles.has(p.pos) && !posMap[p.pos]) posMap[p.pos] = p; });

    const starterRows = FORMATION_ROWS.map(row => `
      <div style="display:flex;gap:6px;justify-content:center;margin-bottom:6px">
        ${row.map(pos => posMap[pos] ? playerCard(posMap[pos]) : emptySlot(pos)).join('')}
      </div>`).join('');

    // Bench: only show if their role is done AND the starter was sold (bench action was possible)
    const visibleBench = t.bench.filter(p => {
      if(!doneRoles.has(p.pos)) return false;
      const dec = G.benchDecisions[p.pos]?.find(d => d.teamIdx === ti);
      return !!dec; // only show if a decision was made (sell or promote)
    });

    const benchSection = visibleBench.length
      ? `<div style="font-family:'Barlow Condensed';font-size:10px;letter-spacing:2px;color:var(--muted);
           margin:12px 0 8px;padding-top:10px;border-top:1px dashed var(--border)">RISERVE</div>
         <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:5px">
           ${visibleBench.map(p => {

const API_KEY = 'd73920f49174a8d1172008e180dba864';
const API_BASE = 'https://v3.football.api-sports.io';

// Position mapping: API positions → game positions
const POS_MAP = {
  'Goalkeeper': ['POR'],
  'Defender': ['DCS','DCD','TS','TD'],   // will be distributed
  'Midfielder': ['CCS','CDC','CCD'],
  'Attacker': ['AS','ATT','AD'],
};

/* ── Firebase cache helpers ── */
async function fbCacheGet(path){
  if(!window._fb) return null;
  try{
    const all = await window._fb.loadAll();
    // traverse path
    let node = all;
    for(const p of path.split('/')) node = node?.[p];
    return node || null;
  }catch{ return null; }
}
async function fbCacheSet(path, data){
  if(!window._fb) return;
  try{
    // Use a dedicated cache key in firebase
    const parts = path.split('/');
    const key = 'cache_' + parts.join('_');
    await window._fb.saveGame(key, {data, cachedAt: Date.now()});
  }catch(e){ console.warn('Cache save failed', e); }
}

/* ── API call with in-memory + Firebase cache, sequential queue ── */
const _memCache = {};     // in-memory cache: survives the session
let _lastApiCall = 0;     // timestamp of last real API call
const API_MIN_INTERVAL = 7000; // 7s between calls → max ~8/min (safe under 10/min limit)

async function _waitRateLimit(){
  const now = Date.now();
  const wait = _lastApiCall + API_MIN_INTERVAL - now;
  if(wait > 0){
    await new Promise(r => setTimeout(r, wait));
  }
  _lastApiCall = Date.now();
}

async function apiCall(endpoint, params={}, cacheHours=24){
  const cacheKey = endpoint.split('/').join('_') + '_' + JSON.stringify(params);

  // 1. Check in-memory cache first (instant, no Firebase call)
  if(_memCache[cacheKey] && (Date.now() - _memCache[cacheKey].cachedAt) < cacheHours * 3600000){
    return _memCache[cacheKey].data;
  }

  // 2. Check Firebase cache
  const fbCached = await fbCacheGet('cache/' + cacheKey);
  if(fbCached && fbCached.cachedAt && (Date.now() - fbCached.cachedAt) < cacheHours * 3600000){
    _memCache[cacheKey] = fbCached; // warm memory cache
    return fbCached.data;
  }

  // 3. Real API call — enforce rate limit
  await _waitRateLimit();
  const url = API_BASE + endpoint + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url, { headers: { 'x-apisports-key': API_KEY } });
  if(!res.ok) throw new Error('API error ' + res.status);
  const json = await res.json();
  if(json.errors && Object.keys(json.errors).length && json.response && !json.response.length){
    throw new Error(Object.values(json.errors)[0]);
  }
  const data = json.response || [];

  // 4. Save to both caches
  _memCache[cacheKey] = {data, cachedAt: Date.now()};
  fbCacheSet('cache/' + cacheKey, data); // fire and forget
  return data;
}

  const resultsEl = document.getElementById('teamSearchResults');
  const statusEl = document.getElementById('searchStatus');

    const searchData = await apiCall('/teams', { search: q }, 72);

/* ── LOAD ROSTER FROM API ── */
async function loadRoster(teamId, leagueId, season){
  const data = await apiCall('/players', {team: teamId, league: leagueId, season}, 48);
  if(!data.length) throw new Error('Nessun giocatore trovato per questa squadra');

  // Group by position
  const byPos = {GK:[], DEF:[], MID:[], ATT:[]};
  data.forEach(item=>{
    const p = item.player;
    const stats = item.statistics?.[0];
    const pos = stats?.games?.position || 'Midfielder';
    const obj = {
      name: p.name?.toUpperCase() || 'SCONOSCIUTO',
      nat: p.nationality || '—',
      age: p.age || 25,
      val: estimateValue(pos, stats),
      status: 'starter',
    };
    if(pos==='Goalkeeper') byPos.GK.push(obj);
    else if(pos==='Defender') byPos.DEF.push(obj);
    else if(pos==='Midfielder') byPos.MID.push(obj);
    else byPos.ATT.push(obj);
  });

  // Sort each group by appearances (more played = more likely starter)
  const sortByApps = arr => arr.sort((a,b)=>(b._apps||0)-(a._apps||0));
  data.forEach(item=>{
    const name = item.player.name?.toUpperCase();
    const apps = item.statistics?.[0]?.games?.appearences || 0;
    ['GK','DEF','MID','ATT'].forEach(g=>{ const found=byPos[g].find(p=>p.name===name); if(found) found._apps=apps; });
  });
  ['GK','DEF','MID','ATT'].forEach(g=>sortByApps(byPos[g]));

  // Assign game positions
  const assignPos = (players, positions) => {
    return positions.map((pos,i)=>({...(players[i]||{name:'—',nat:'—',age:25,val:5e6,status:'starter'}), pos}));
  };

  const starters = [
    ...assignPos(byPos.GK, ['POR']),
    ...assignPos(byPos.DEF, ['DCS','DCD','TS','TD']),
    ...assignPos(byPos.MID, ['CCS','CDC','CCD']),
    ...assignPos(byPos.ATT, ['AS','ATT','AD']),
  ];

  const usedNames = new Set(starters.map(p=>p.name));
  const allPlayers = [...byPos.GK,...byPos.DEF,...byPos.MID,...byPos.ATT];
  const bench = allPlayers.filter(p=>!usedNames.has(p.name)).slice(0,11).map((p,i)=>{
    const benchPos = ROLES_ORDER[i] || 'MID';
    return {...p, pos:benchPos, status:'bench'};
  });

  // Pad bench if needed
  while(bench.length < 11){
    bench.push({pos:ROLES_ORDER[bench.length]||'MID',name:'—',nat:'—',age:25,status:'bench'});
  }

  return {starters, bench};
}

function estimateValue(pos, stats){
  // rough estimate based on position (real values need Transfermarkt)
  const apps = stats?.games?.appearences || 0;
  const goals = stats?.goals?.total || 0;
  const base = pos==='Goalkeeper'?5:pos==='Defender'?8:pos==='Midfielder'?10:15;
  return Math.max(1, Math.round(base + goals*2 + apps*0.3)) * 1e6;
}
